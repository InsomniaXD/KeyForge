<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KeyForge | Custom Keyboards</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/builder.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page-transition-overlay" id="transition-curtain"></div>

    <nav>
      <div class="nav-left">
        <a href="index.html" class="logo-link">
          <div class="logo">KEY<span>FORGE</span></div>
        </a>
        <div class="nav-links">
          <a href="builder.html" class="nav-build-link">Build</a>
          <a href="#">Orders</a>

      </div>

      <div class="nav-right">
        <div class="nav-links">
          <a href="about.html">About</a>
          <a href="#">Support</a>
          <a href="account.html" id="account-link">Login</a>
        </div>
        <div class="nav-separator"></div>
        <button id="theme-toggle" aria-label="Toggle Dark Mode">
          <svg
            id="theme-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></svg>
        </button>
      </div>
    </nav>

    <header class="hero">

        <h1>You bring the vision.<br /><span>We build the rest.</span></h1>
        <button
          class="cta-button"
          onclick="window.location.href = 'builder.html'"

          Build your dream keyboard

      </div>
    </header>

    <script src="js/script.js"></script>
