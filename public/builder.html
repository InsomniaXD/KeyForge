<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KeyForge | Builder</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/builder.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />

    <script>
      const activeUser = localStorage.getItem("loggedInUser");
      if (!activeUser) {
        window.location.href =
          "account.html?msg=login_required&redirect=builder";
      }
      /* Check and apply dark theme from local storage */
      if (localStorage.getItem("theme") === "dark") {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body>
    <script>
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
      }
    </script>

    <nav>
      <div class="nav-left">
        <a href="index.html" class="logo-link">
          <div class="logo">KEY<span>FORGE</span></div>
        </a>
        <div class="nav-links">
          <a href="about.html">About</a>
        </div>
      </div>
      <div class="nav-right">
        <div class="nav-links">
          <a href="builder.html" class="nav-build-link">Build</a>
          <a
            href="cart.html"
            id="cart-link"
            style="color: var(--color-tertiary); font-weight: 900"
            >Cart (0)</a
          >
          <a href="account.html" id="account-link">Login</a>
        </div>
        <div class="nav-separator"></div>
        <button id="theme-toggle" aria-label="Toggle Dark Mode">
          <svg
            id="theme-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></svg>
        </button>
      </div>
    </nav>

    <main class="builder-page">
      <aside class="builder-sidebar">
        <div class="sidebar-inner">
          <h1>Build your perfect board.</h1>
          <p class="sidebar-copy">Choose each part step by step.</p>
          <div class="progress">
            <div class="progress-step active" data-progress="1">01 Kit</div>
            <div class="progress-step" data-progress="2">02 Switch</div>
            <div class="progress-step" data-progress="3">03 Keycaps</div>
            <div class="progress-step" data-progress="4">04 Mods</div>
          </div>
        </div>
      </aside>

      <section class="builder-main">
        <div class="step-header">
          <h2 id="step-title">Choose Kit</h2>
          <div class="step-actions">
            <button class="cta-button back-btn">Back</button>
            <button class="cta-button next-btn">Next</button>
          </div>
        </div>

        <div class="step active" id="step-1">
          <div class="option-grid" id="grid-case"></div>
        </div>
        <div class="step" id="step-2">
          <div class="option-grid" id="grid-switch"></div>
        </div>
        <div class="step" id="step-3">
          <div class="option-grid" id="grid-keycaps"></div>
        </div>
        <div class="step" id="step-4">
          <div class="option-grid" id="grid-mods"></div>
        </div>
      </section>

      <aside class="summary-panel">
        <h3>Your Build</h3>
        <div class="summary-card">
          <span class="summary-label">Kit</span>
          <div id="summary-1" class="summary-value">
            <span class="empty">Not selected</span>
          </div>
        </div>
        <div class="summary-card">
          <span class="summary-label">Switch</span>
          <div id="summary-2" class="summary-value">
            <span class="empty">Not selected</span>
          </div>
        </div>
        <div class="summary-card">
          <span class="summary-label">Keycaps</span>
          <div id="summary-3" class="summary-value">
            <span class="empty">Not selected</span>
          </div>
        </div>
        <div class="summary-card">
          <span class="summary-label">Mods</span>
          <div id="summary-4" class="summary-value">
            <span class="empty">Not selected</span>
          </div>
        </div>

        <div class="summary-divider"></div>

        <div
          style="
            display: flex;
            justify-content: space-between;
            font-weight: 900;
            margin-bottom: 1.5rem;
          "
        >
          <span>Total</span>
          <span id="total-price">£0.00</span>
        </div>

        <button
          id="clear-build-btn"
          class="clear-btn"
          style="margin-bottom: 0.8rem"
        >
          Clear Build
        </button>
        <button id="add-to-cart-btn" class="cart-btn">Add to Cart</button>
      </aside>
    </main>

    <div id="cart-toast" class="toast-notification">
      <span>Build added to cart!</span>
      <a href="cart.html">View Cart →</a>
    </div>

    <script src="js/script.js"></script>
    <script src="js/builder.js"></script>
  </body>
</html>
