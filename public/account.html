<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KeyForge | Account</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/account.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
      }
    </script>

    <nav>
      <div class="nav-left">
        <a href="index.html" class="logo-link">
          <div class="logo">KEY<span>FORGE</span></div>
        </a>
        <div class="nav-links">
          <a href="about.html">About</a>
        </div>
      </div>
      <div class="nav-right">
        <div class="nav-links">
          <a href="builder.html" class="nav-build-link">Build</a>
          <a
            href="cart.html"
            id="cart-link"
            style="color: var(--color-tertiary); font-weight: 900"
            >Cart (0)</a
          >
          <a href="account.html" id="account-link">Login</a>
        </div>
        <div class="nav-separator"></div>
        <button id="theme-toggle" aria-label="Toggle Dark Mode">
          <svg
            id="theme-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></svg>
        </button>
      </div>
    </nav>

    <div
      id="auth-alert"
      style="
        display: none;
        background: #ffeb3b;
        color: #000;
        text-align: center;
        padding: 10px;
        font-weight: 700;
        margin-bottom: 1rem;
      "
    >
      You must be logged in to access that page.
    </div>

    <div id="login-section" class="account-card">
      <h1>Welcome Back</h1>
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="login-email" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="login-password" />
      </div>
      <button class="cta-button" style="width: 100%" id="login-btn">
        Login
      </button>
      <p style="margin-top: 1.5rem; font-size: 0.9rem">
        No account?
        <a href="#" id="show-signup" style="color: var(--color-tertiary)"
          >Create one</a
        >
      </p>
    </div>

    <div id="signup-section" class="account-card" style="display: none">
      <h1>Create Account</h1>
      <div class="signup-grid">
        <div class="input-group">
          <label>First Name</label>
          <input type="text" id="signup-firstname" />
        </div>
        <div class="input-group">
          <label>Last Name</label>
          <input type="text" id="signup-lastname" />
        </div>
      </div>
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="signup-email" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="signup-password" />
      </div>
      <button class="cta-button" style="width: 100%" id="signup-btn">
        Sign Up
      </button>
      <p style="margin-top: 1.5rem; font-size: 0.9rem">
        Already have an account?
        <a href="#" id="show-login" style="color: var(--color-tertiary)"
          >Login</a
        >
      </p>
    </div>

    <div
      id="account-section"
      class="account-card"
      style="display: none; text-align: left; max-width: 800px"
    >
      <div class="profile-header">
        <h2 id="p-full-name">User Name</h2>
        <p id="p-email">user@example.com</p>
      </div>

      <div class="tab-container">
        <button class="tab-btn active" id="tab-history-btn">
          Order History
        </button>
        <button class="tab-btn" id="tab-settings-btn">Settings</button>
        <button
          id="logout-btn"
          style="
            margin-left: auto;
            color: #ff4444;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-family: inherit;
          "
        >
          Logout
        </button>
      </div>

      <div id="tab-history">
        <div id="orders-list"></div>
      </div>

      <div id="tab-settings" style="display: none">
        <div class="signup-grid">
          <div class="input-group">
            <label>First Name</label>
            <input type="text" id="edit-firstname" />
          </div>
          <div class="input-group">
            <label>Last Name</label>
            <input type="text" id="edit-lastname" />
          </div>
        </div>
        <button class="cta-button" id="save-profile-btn">Save Changes</button>
      </div>
    </div>

    <script src="js/script.js"></script>
    <script src="js/account.js"></script>
  </body>
</html>
