<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KeyForge | Account</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      .account-card {
        max-width: 600px;
        width: 90%;
        margin: 4rem auto;
        background: rgba(128, 128, 128, 0.05);
        padding: 2.5rem;
        border-radius: 16px;
        border: 1px solid rgba(128, 128, 128, 0.1);
        text-align: center;
      }
      .input-group {
        text-align: left;
        margin-bottom: 1.2rem;
      }
      .input-group label {
        display: block;
        font-size: 0.8rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        opacity: 0.7;
      }
      .input-group input {
        width: 100%;
        padding: 0.8rem;
        border-radius: 8px;
        border: 1px solid rgba(128, 128, 128, 0.2);
        background: transparent;
        color: inherit;
      }
      .signup-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .tab-container {
        display: flex;
        gap: 2rem;
        border-bottom: 1px solid rgba(128, 128, 128, 0.1);
        margin-bottom: 2rem;
      }
      .tab-btn {
        background: none;
        border: none;
        color: inherit;
        padding: 1rem 0;
        cursor: pointer;
        opacity: 0.5;
        font-weight: 700;
        position: relative;
      }
      .tab-btn.active {
        opacity: 1;
      }
      .tab-btn.active::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: var(--color-tertiary);
      }

      .profile-header {
        margin-bottom: 2rem;
        text-align: left;
      }
      .profile-header h2 {
        font-size: 2rem;
        margin-bottom: 0.2rem;
      }
      .profile-header p {
        opacity: 0.6;
      }

      .order-card {
        background: rgba(128, 128, 128, 0.05);
        padding: 1.5rem;
        border-radius: 12px;
        margin-bottom: 1rem;
        text-align: left;
        border: 1px solid rgba(128, 128, 128, 0.1);
      }
      .order-meta {
        display: flex;
        justify-content: space-between;
        font-size: 0.8rem;
        opacity: 0.6;
        margin-bottom: 0.5rem;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-left">
        <a href="index.html" class="logo-link"
          ><div class="logo">KEY<span>FORGE</span></div></a
        >
        <div class="nav-links">
          <a href="builder.html">Build</a>
          <a href="account.html">Orders</a>
        </div>
      </div>
      <div class="nav-right">
        <div class="nav-links">
          <a href="about.html">About</a>
          <a href="account.html" id="account-link">Login</a>
        </div>
        <div class="nav-separator"></div>
        <button id="theme-toggle" aria-label="Toggle Dark Mode">
          <svg
            id="theme-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></svg>
        </button>
      </div>
    </nav>

    <div id="login-section" class="account-card">
      <h1>Welcome Back</h1>
      <form id="login-form">
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" id="login-email" required />
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="login-password" required />
        </div>
        <button type="submit" class="cta-button" style="width: 100%">
          Login
        </button>
      </form>
      <p style="margin-top: 1.5rem; font-size: 0.9rem">
        No account?
        <a href="#" id="show-signup" style="color: var(--color-tertiary)"
          >Create one</a
        >
      </p>
    </div>

    <div id="signup-section" class="account-card" style="display: none">
      <h1>Create Account</h1>
      <form id="signup-form">
        <div class="signup-grid">
          <div class="input-group">
            <label>First Name</label>
            <input type="text" id="signup-firstname" required />
          </div>
          <div class="input-group">
            <label>Last Name</label>
            <input type="text" id="signup-lastname" required />
          </div>
        </div>
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" id="signup-email" required />
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="signup-password" required />
        </div>
        <button type="submit" class="cta-button" style="width: 100%">
          Sign Up
        </button>
      </form>
      <p style="margin-top: 1.5rem; font-size: 0.9rem">
        Already have an account?
        <a href="#" id="show-login" style="color: var(--color-tertiary)"
          >Login</a
        >
      </p>
    </div>

    <div
      id="account-section"
      class="account-card"
      style="display: none; text-align: left; max-width: 800px"
    >
      <div class="profile-header">
        <h2 id="p-full-name">User Name</h2>
        <p id="p-email">user@example.com</p>
      </div>

      <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('history')">
          Order History
        </button>
        <button class="tab-btn" onclick="switchTab('settings')">
          Settings
        </button>
        <button
          id="logout-btn"
          style="
            margin-left: auto;
            color: #ff4444;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 700;
          "
        >
          Logout
        </button>
      </div>

      <div id="tab-history">
        <div id="orders-list"></div>
      </div>

      <div id="tab-settings" style="display: none">
        <form id="edit-profile-form">
          <div class="signup-grid">
            <div class="input-group">
              <label>First Name</label>
              <input type="text" id="edit-firstname" required />
            </div>
            <div class="input-group">
              <label>Last Name</label>
              <input type="text" id="edit-lastname" required />
            </div>
          </div>
          <button type="submit" class="cta-button">Save Changes</button>
        </form>
      </div>
    </div>

    <script src="js/script.js"></script>

    <script>
      const loginSection = document.getElementById("login-section");
      const signupSection = document.getElementById("signup-section");
      const accountSection = document.getElementById("account-section");

      // UI Switches
      document.getElementById("show-signup").onclick = () => {
        loginSection.style.display = "none";
        signupSection.style.display = "block";
      };
      document.getElementById("show-login").onclick = () => {
        signupSection.style.display = "none";
        loginSection.style.display = "block";
      };

      function switchTab(tab) {
        document.getElementById("tab-history").style.display =
          tab === "history" ? "block" : "none";
        document.getElementById("tab-settings").style.display =
          tab === "settings" ? "block" : "none";
        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.classList.toggle(
            "active",
            btn.textContent.toLowerCase().includes(tab),
          );
        });
      }

      // --- SIGNUP LOGIC ---
      document.getElementById("signup-form").onsubmit = (e) => {
        e.preventDefault();
        const email = document.getElementById("signup-email").value;
        let users = JSON.parse(localStorage.getItem("kf_users") || "[]");

        if (users.find((u) => u.email === email)) {
          alert("Email already in use.");
          return;
        }

        const newUser = {
          firstName: document.getElementById("signup-firstname").value,
          lastName: document.getElementById("signup-lastname").value,
          email: email,
          password: document.getElementById("signup-password").value,
        };

        users.push(newUser);
        localStorage.setItem("kf_users", JSON.stringify(users));
        loginUser(newUser);
      };

      // --- LOGIN LOGIC ---
      document.getElementById("login-form").onsubmit = (e) => {
        e.preventDefault();
        const email = document.getElementById("login-email").value;
        const pass = document.getElementById("login-password").value;

        let users = JSON.parse(localStorage.getItem("kf_users") || "[]");
        const user = users.find(
          (u) => u.email === email && u.password === pass,
        );

        if (user) {
          loginUser(user);
        } else {
          alert("Invalid credentials.");
        }
      };

      function loginUser(user) {
        localStorage.setItem("loggedInUser", user.email);
        localStorage.setItem("kf_user_data", JSON.stringify(user));
        showAccount(user);
      }

      function showAccount(user) {
        loginSection.style.display = "none";
        signupSection.style.display = "none";
        accountSection.style.display = "block";

        document.getElementById("p-full-name").textContent =
          `${user.firstName} ${user.lastName}`;
        document.getElementById("p-email").textContent = user.email;
        document.getElementById("edit-firstname").value = user.firstName;
        document.getElementById("edit-lastname").value = user.lastName;

        renderOrders();
      }

      function renderOrders() {
        const list = document.getElementById("orders-list");
        const email = localStorage.getItem("loggedInUser");
        const allOrders = JSON.parse(localStorage.getItem("kf_orders") || "[]");
        const myOrders = allOrders.filter((o) => o.userEmail === email);

        if (myOrders.length === 0) {
          list.innerHTML = `<p style="opacity: 0.5;">No builds saved yet.</p>`;
          return;
        }

        list.innerHTML = myOrders
          .reverse()
          .map(
            (o) => `
                <div class="order-card">
                    <div class="order-meta"><span>ID: #${o.id}</span><span>${o.date}</span></div>
                    <p><strong>${o.case.name}</strong></p>
                    <p style="font-size: 0.85rem; opacity: 0.7;">${o.switch.name} • ${o.keycaps.name}</p>
                    <p style="margin-top: 0.8rem; color: var(--color-tertiary); font-weight: 700;">${o.total}</p>
                </div>
            `,
          )
          .join("");
      }

      // --- EDIT PROFILE LOGIC ---
      document.getElementById("edit-profile-form").onsubmit = (e) => {
        e.preventDefault();
        const email = localStorage.getItem("loggedInUser");
        let users = JSON.parse(localStorage.getItem("kf_users") || "[]");
        const idx = users.findIndex((u) => u.email === email);

        if (idx !== -1) {
          users[idx].firstName =
            document.getElementById("edit-firstname").value;
          users[idx].lastName = document.getElementById("edit-lastname").value;
          localStorage.setItem("kf_users", JSON.stringify(users));
          localStorage.setItem("kf_user_data", JSON.stringify(users[idx]));
          alert("Settings saved!");
          showAccount(users[idx]);
        }
      };

      if (localStorage.getItem("loggedInUser")) {
        showAccount(JSON.parse(localStorage.getItem("kf_user_data")));
      }

      document.getElementById("logout-btn").onclick = () => {
        localStorage.removeItem("loggedInUser");
        localStorage.removeItem("kf_user_data");
        window.location.reload();
      };
    </script>
  </body>
</html>
