<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyForge | Account</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        .account-card { max-width: 650px !important; width: 95%; overflow: hidden; margin: 2rem auto; }
        .signup-grid, .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; width: 100%; }
        .input-group input, .input-group select { width: 100% !important; box-sizing: border-box; }
        
        .profile-display {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 1.5rem; text-align: left; margin: 2rem 0; padding: 1.5rem; 
            background: rgba(128,128,128,0.03); border-radius: 8px;
        }
        .info-group { min-width: 0; }
        .info-group label { font-size: 0.65rem; font-weight: 900; opacity: 0.5; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .info-group p { font-weight: 600; word-break: break-word; }
        #p-username { color: var(--color-tertiary); }
        .address-group { grid-column: 1 / -1; border-top: 1px solid rgba(128,128,128,0.1); padding-top: 1rem; }

        .settings-panel { border-top: 1px solid rgba(128,128,128,0.1); padding-top: 2rem; margin-top: 2rem; text-align: left; }
        .tab-buttons { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .tab-btn { background: none; border: none; color: inherit; opacity: 0.5; cursor: pointer; font-weight: 700; font-size: 0.9rem; padding: 0.5rem 0; border-bottom: 2px solid transparent; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--color-tertiary); }
        
        @media (max-width: 480px) { .signup-grid, .settings-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="index.html" class="logo-link">
                <div class="logo">KEY<span>FORGE</span></div>
            </a>
            <div class="nav-links">
                <a href="builder.html" class="nav-build-link">Build</a>
                <a href="#">Orders</a>
            </div>
        </div>
        
        <div class="nav-right">
            <div class="nav-links">
                <a href="about.html">About</a>
                <a href="#">Support</a>
                <a href="account.html" id="account-link">Login</a>
            </div>
            <div class="nav-separator"></div>
            <button id="theme-toggle" aria-label="Toggle Dark Mode">
                <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
            </button>
        </div>
    </nav>

    <main class="hero">
        <div class="hero-content">
            <section class="account-card" id="login-section">
                <h1>Login</h1>
                <form id="login-form" class="auth-form">
                    <div class="input-group"><label>Email</label><input type="email" id="login-email" required></div>
                    <div class="input-group"><label>Password</label><input type="password" id="login-password" required></div>
                    <button type="submit" class="cta-button full-width">Login</button>
                </form>
                <p class="switch-text">Don't have an account? <span id="show-signup">Sign Up</span></p>
            </section>

            <section class="account-card" id="signup-section" style="display: none;">
                <h1>Create Account</h1>
                <form id="signup-form" class="auth-form">
                    <div class="signup-grid">
                        <div class="input-group"><label>Full Name</label><input type="text" id="signup-name" required></div>
                        <div class="input-group"><label>Username</label><input type="text" id="signup-username" required></div>
                    </div>
                    <div class="input-group"><label>Email</label><input type="email" id="signup-email" required></div>
                    <div class="input-group"><label>Shipping Address</label><input type="text" id="signup-address" required></div>
                    <div class="input-group">
                        <label>Gender</label>
                        <select id="signup-gender">
                            <option value="Not Specified">Prefer not to say</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Non-binary">Non-binary</option>
                        </select>
                    </div>
                    <div class="input-group"><label>Password</label><input type="password" id="signup-password" required></div>
                    <button type="submit" class="cta-button full-width">Sign Up</button>
                </form>
                <p class="switch-text">Already have an account? <span id="show-login">Login</span></p>
            </section>

            <section class="account-card" id="account-section" style="display: none;">
                <h1>My Account</h1>
                
                <div class="profile-display">
                    <div class="info-group"><label>Name</label><p id="p-name"></p></div>
                    <div class="info-group"><label>Username</label><p id="p-username"></p></div>
                    <div class="info-group"><label>Email</label><p id="p-email"></p></div>
                    <div class="info-group"><label>Gender</label><p id="p-gender"></p></div>
                    <div class="info-group address-group"><label>Address</label><p id="p-address"></p></div>
                </div>

                <div class="settings-panel">
                    <div class="tab-buttons">
                        <button class="tab-btn active" onclick="switchTab('history')">Order History</button>
                        <button class="tab-btn" onclick="switchTab('settings')">Settings</button>
                    </div>

                    <div id="tab-history">
                        <div id="orders-list"></div>
                    </div>

                    <div id="tab-settings" style="display:none;">
                        <form id="edit-profile-form" class="auth-form" style="margin-top:0;">
                            <h3>Update Details</h3>
                            <div class="settings-grid">
                                <div class="input-group"><label>Full Name</label><input type="text" id="edit-name"></div>
                                <div class="input-group"><label>Username</label><input type="text" id="edit-username"></div>
                            </div>
                            <div class="input-group"><label>Address</label><input type="text" id="edit-address"></div>
                            <button type="submit" class="cta-button" style="width:fit-content; padding: 0.8rem 2rem;">Save Changes</button>
                        </form>

                        <form id="change-pass-form" class="auth-form" style="margin-top:2rem; border-top: 1px solid rgba(128,128,128,0.1); padding-top:2rem;">
                            <h3>Security</h3>
                            <div class="input-group"><label>New Password</label><input type="password" id="new-password" required></div>
                            <button type="submit" class="cta-button" style="width:fit-content; padding: 0.8rem 2rem; background: var(--color-accent);">Update Password</button>
                        </form>
                    </div>
                </div>

                <button id="logout-btn" class="clear-btn" style="width: 100%; height: 50px; margin-top: 2rem;">Logout</button>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        const loginSection = document.getElementById("login-section");
        const signupSection = document.getElementById("signup-section");
        const accountSection = document.getElementById("account-section");

        function switchTab(tab) {
            document.getElementById('tab-history').style.display = tab === 'history' ? 'block' : 'none';
            document.getElementById('tab-settings').style.display = tab === 'settings' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase().includes(tab));
            });
        }

        document.getElementById("show-signup").onclick = () => { loginSection.style.display="none"; signupSection.style.display="block"; };
        document.getElementById("show-login").onclick = () => { signupSection.style.display="none"; loginSection.style.display="block"; };

        document.getElementById("signup-form").onsubmit = (e) => {
            e.preventDefault();
            const user = {
                name: document.getElementById("signup-name").value,
                username: document.getElementById("signup-username").value,
                email: document.getElementById("signup-email").value,
                address: document.getElementById("signup-address").value,
                gender: document.getElementById("signup-gender").value,
                password: document.getElementById("signup-password").value
            };
            localStorage.setItem("kf_user_data", JSON.stringify(user));
            alert("Account created!");
            location.reload();
        };

        document.getElementById("login-form").onsubmit = (e) => {
            e.preventDefault();
            const storedUser = JSON.parse(localStorage.getItem("kf_user_data"));
            if (storedUser && document.getElementById("login-email").value === storedUser.email && document.getElementById("login-password").value === storedUser.password) {
                localStorage.setItem("loggedInUser", storedUser.email);
                showAccount(storedUser);
            } else { alert("Invalid credentials."); }
        };

        // SAVE PROFILE CHANGES
        document.getElementById("edit-profile-form").onsubmit = (e) => {
            e.preventDefault();
            let user = JSON.parse(localStorage.getItem("kf_user_data"));
            user.name = document.getElementById("edit-name").value;
            user.username = document.getElementById("edit-username").value;
            user.address = document.getElementById("edit-address").value;
            localStorage.setItem("kf_user_data", JSON.stringify(user));
            alert("Details updated!");
            showAccount(user);
        };

        // CHANGE PASSWORD
        document.getElementById("change-pass-form").onsubmit = (e) => {
            e.preventDefault();
            let user = JSON.parse(localStorage.getItem("kf_user_data"));
            user.password = document.getElementById("new-password").value;
            localStorage.setItem("kf_user_data", JSON.stringify(user));
            alert("Password updated successfully!");
            document.getElementById("new-password").value = "";
        };

        function showAccount(user) {
            loginSection.style.display = "none"; signupSection.style.display = "none"; accountSection.style.display = "block";
            document.getElementById("p-name").textContent = user.name;
            document.getElementById("p-username").textContent = "@" + user.username;
            document.getElementById("p-email").textContent = user.email;
            document.getElementById("p-gender").textContent = user.gender;
            document.getElementById("p-address").textContent = user.address;
            
            // Fill edit fields
            document.getElementById("edit-name").value = user.name;
            document.getElementById("edit-username").value = user.username;
            document.getElementById("edit-address").value = user.address;
            
            renderOrders();
        }

        function renderOrders() {
            const orders = JSON.parse(localStorage.getItem('kf_user_orders') || "[]");
            const list = document.getElementById("orders-list");
            if (orders.length === 0) { list.innerHTML = `<p style="opacity: 0.5; padding: 1rem 0;">No builds yet.</p>`; return; }
            list.innerHTML = orders.reverse().map(o => `
                <div style="background: rgba(128,128,128,0.05); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border: 1px solid rgba(128,128,128,0.1);">
                    <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:0.5rem;"><strong>#${o.id}</strong><span>${o.date}</span></div>
                    <div style="font-size:0.85rem; opacity:0.8;">${o.case.name} • ${o.switch.name} • ${o.keycaps.name}</div>
                </div>`).join('');
        }

        if (localStorage.getItem("loggedInUser")) showAccount(JSON.parse(localStorage.getItem("kf_user_data")));
        document.getElementById("logout-btn").onclick = () => { localStorage.removeItem("loggedInUser"); location.href = "index.html"; };
    </script>
</body>
</html>
